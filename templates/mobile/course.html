<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课程列表</title>
{#    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">#}
    <style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
            color: #333;
        }
        .course-item {
            text-align: center;
            margin-bottom: 2rem;
            cursor: pointer; /* 添加鼠标指针样式 */
        }
        .course-item img {
            width: 100%;
            height: auto;
            object-fit: cover;
            border-radius: 10px; /* 设置图片圆角 */
        }
        .course-title {
            font-size: 1rem;
            font-weight: bold;
            color: #333;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
<div class="container mt-4">
{#    <h2>课程列表</h2>#}
    <div id="courseList" class="row">
        <!-- 课程项将通过JavaScript动态插入 -->
    </div>
    <div id="loading" class="text-center my-4" style="display: none;">
        <div class="spinner-border" role="status">
            <span class="visually-hidden">加载中...</span>
        </div>
    </div>
</div>

{#<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>#}
{#<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>#}
<script>
    let currentPage = 1;
    const coursesPerPage = 10;
    let loading = false;

    document.addEventListener('DOMContentLoaded', () => {
        loadCourses();

        window.addEventListener('scroll', () => {
            if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 100 && !loading) {
                loadCourses();
            }
        });
    });

    function loadCourses() {
        loading = true;
        const loadingElement = document.getElementById('loading');
        loadingElement.style.display = 'block';

        $.ajax({
            url: '/helper_cur/get_courses/',  // Django视图的URL
            method: 'POST',
            data: {
                page: currentPage,
                per_page: coursesPerPage
            },
            dataType: 'json',
            success: function(response) {
                console.log(response)
                const courses = response;
                const courseList = document.getElementById('courseList');

                courses.forEach(course => {
                    const courseItem = document.createElement('div');
                    courseItem.className = 'col-md-4 course-item';
                    courseItem.onclick = () => window.location.href = `/m/course_details/${course.id}/`;
                    courseItem.innerHTML = `
                        <img src="${course.visuel}" alt="课程封面">
                        <div class="course-title">${course.title}</div>
                    `;
                    courseList.appendChild(courseItem);
                });

                currentPage++;
                loadingElement.style.display = 'none';
                loading = false;
            },
            error: function() {
                loadingElement.style.display = 'none';
                loading = false;
                alert('加载课程失败，请稍后重试。');
            }
        });
    }
</script>
</body>
</html>
