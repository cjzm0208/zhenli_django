{% load static %}
<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分类页面</title>
{#    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">#}

    <style>
        body {
            font-family: 'Noto Sans SC', 'Noto Serif SC', 'WenQuanYi Micro Hei', sans-serif;
            color: #333;
        }

        h2 {
            color: #ee591f;
            font-size: 1.75rem;
            font-weight: bold;
            margin-bottom: 1.5rem;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }

        .category-item, .subcategory-item, .third-category-item {
            text-align: center;
            cursor: pointer;
        }

        .category-item img, .subcategory-item img, .third-category-item img {
            width: 100%;
            height: auto;
            object-fit: cover;
            aspect-ratio: 1 / 1;
            border-radius: 8px; /* 添加圆角 */
        }

        .category-item .category-text, .subcategory-item .subcategory-text, .third-category-item .third-category-text {
            margin-top: 0.5rem;
            font-size: 1.25rem;
            font-weight: bold;
            color: #333;
        }

        .subcategory-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-top: 1rem;
        }

        .third-category-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-top: 1rem;
        }

        .note {
            font-size: 0.9rem;
            color: #666;
            margin-top: 1rem;
        }
        
        #navbar_cathegory a{
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container mt-4">
    {#    <h2>分类列表</h2>#}
    <div class="navbar d-flex justify-content-start"
         style="margin-bottom: 2rem;background: transparent !important;border-top: transparent" id="navbar_cathegory">
        <a onclick="Subcategory(0)">分类</a> <span style="margin: 0rem 0.5rem">/</span>
        {#    <a href="#">新闻</a> <span style="margin: 0rem 0.5rem">/</span> #}
        {#    <a href="#">每日新闻</a>#}
    </div>
    <div class="category-grid" id="category_grid">

    </div>
    <div style="height: 10rem"></div>
</div>

<script src="{% static 'm/bootstrap.bundle.js' %}"></script>
<script>
    {#const fristCathegory = JSON.parse('{{ new_cathegorys|safe|escapejs }}');#}
    {#console.log(fristCathegory)#}
    var cathegorys = JSON.parse('{{ new_cathegorys|escapejs }}');
    {#for (var i = 0; i < cathegorys.length; i++) {#}
    {#    if (cathegorys[i].parent == 0) {#}
    {#        $("#category_grid").append(`#}
    {#        <div class="category-item" onclick="Subcategory(${cathegorys[i].id})">#}
    {#            <img src="${cathegorys[i].visuel}" alt="一级分类图片">#}
    {#            <div class="category-text">${cathegorys[i].title}</div>#}
    {#        </div>#}
    {#    `)#}
    {#    } // 去除空格f（）#}
    {# }#}
    Subcategory(0);
    function CategoryList(id) {
        window.location.href = `/m/cathegory/${id}/`;
    }
    function Subcategory(id) {
        $("#category_grid").html("");
        for (var i = 0; i < cathegorys.length; i++) {
            if (cathegorys[i].parent == id) {
                var ishavasubcategory = false
                for (var x = 0; x < cathegorys.length; x++) {
                    if (cathegorys[x].parent == cathegorys[i].id) {
                        ishavasubcategory =true
                    }
                }
                if(ishavasubcategory){
                    $("#category_grid").append(`
                    <div class="category-item" onclick="Subcategory(${cathegorys[i].id})">
                        <img src="${cathegorys[i].visuel}" alt="一级分类图片">
                        <div class="category-text">${cathegorys[i].title}</div>
                    </div>
                `)
                }else{
                    $("#category_grid").append(`
                    <div class="category-item" onclick="CategoryList(${cathegorys[i].id})">
                        <img src="${cathegorys[i].visuel}" alt="一级分类图片">
                        <div class="category-text">${cathegorys[i].title}</div>
                    </div>
                `)
                }
            } // 去除空格f（）
        }
        $("#navbar_cathegory").html('<a onclick="Subcategory(0)">分类</a> <span style="margin: 0rem 0.5rem">/</span> ');
        var html_navbar_cathegory = ""
        for (var i = 0; i < cathegorys.length; i++) {
            if (cathegorys[i].id == id) {
                html_navbar_cathegory = `<a onclick="Subcategory(${cathegorys[i].id}">${cathegorys[i].title}</a> <span style="margin: 0rem 0.5rem">/</span> ` + html_navbar_cathegory;
                if (cathegorys[i].parent != 0) {
                    for (var x = 0; x < cathegorys.length; x++) {
                        if (cathegorys[x].id == cathegorys[i].parent) {
                            html_navbar_cathegory = `<a onclick="Subcategory(${cathegorys[x].id})">${cathegorys[x].title}</a> <span style="margin: 0rem 0.5rem">/</span> ` + html_navbar_cathegory;
                            if (cathegorys[x].parent != 0) {
                                for (var y = 0; y < cathegorys.length; y++) {
                                    if (cathegorys[y].id == cathegorys[x].parent) {
                                        html_navbar_cathegory = `<a onclick="Subcategory(${cathegorys[y].id}" >${cathegorys[y].title}</a> <span style="margin: 0rem 0.5rem">/</span> ` + html_navbar_cathegory;
                                    }
                                }
                            }
                        }
                    }
                }
            } // 去除空格f（）
        }
        $("#navbar_cathegory").append(html_navbar_cathegory);
    }

</script>
</body>
</html>
