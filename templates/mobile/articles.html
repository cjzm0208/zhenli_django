{% load static %}
<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章列表</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
            color: #333;
        }
        .article-item {
            display: flex;
            margin-bottom: 1rem;
            border-bottom: 1px solid #ddd;
            padding-bottom: 1rem;
            cursor: pointer;
        }
        .article-item img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            margin-right: 1rem;
            border-radius: 10px;
        }
        .article-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .article-title {
            font-size: 0.9rem;
            font-weight: bold;
            color: #333;
            display: -webkit-box;
        -webkit-line-clamp: 2; /* 限制最多显示两行 */
        -webkit-box-orient: vertical;
        overflow: hidden;
        text-overflow: ellipsis; /* 添加省略号 */
        }
        .article-date {
            color: #999;
            font-size: 0.6rem;
        }
        
    </style>
</head>
<body>
<div class="container mt-4">
    <h3 style="margin-bottom: 2rem;text-align: center">{{ cathegory.titre }}</h3>
    <div id="articleList">
        <!-- 文章项将通过JavaScript动态插入 -->
    </div>
    <div id="loading" class="text-center my-4" style="display: none;">
        <div class="spinner-border" role="status">
            <span class="visually-hidden">加载中...</span>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    let currentPage = 1;
    const articlesPerPage = 10;
    let loading = false;

    document.addEventListener('DOMContentLoaded', () => {
        loadArticles();

        window.addEventListener('scroll', () => {
            if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 100 && !loading) {
                loadArticles();
            }
        });
    });

    function loadArticles() {
        loading = true;
        const loadingElement = document.getElementById('loading');
        loadingElement.style.display = 'block';

        $.ajax({
            url: '/helper_cur/get_articles/',  // Django视图的URL
            method: 'POST',
            data: {
                num:{{ fun }},
                page: currentPage,
                per_page: articlesPerPage
            },
            dataType: 'json',
            success: function(response) {
                const articles = response;
                const articleList = document.getElementById('articleList');

                articles.forEach(article => {
                    const articleItem = document.createElement('div');
                    articleItem.className = 'article-item';
                    articleItem.onclick = () => window.location.href = `/m/content/${article.id}/`;
                    articleItem.innerHTML = `
                        <img src="${article.visuel}" alt="文章图片">
                        <div class="article-content">
                            <div class="article-title">${article.title}</div>
                            <div class="article-date">${article.date_publier!=null?article.date_publier.split(" ")[0]:""}</div>
                        </div>
                    `;
                    articleList.appendChild(articleItem);
                });

                currentPage++;
                loadingElement.style.display = 'none';
                loading = false;
            },
            error: function() {
                loadingElement.style.display = 'none';
                loading = false;
                alert('加载文章失败，请稍后重试。');
            }
        });
    }
</script>
</body>
</html>
